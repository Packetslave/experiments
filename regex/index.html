<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Regex Tester <span class="engine-label">JavaScript</span></h1>
  </header>

  <main>
    <section class="pattern-row" aria-label="Pattern">
      <div class="pattern-input-wrap">
        <span class="delim">/</span>
        <input id="pattern" type="text" autocomplete="off" spellcheck="false"
               placeholder="pattern" aria-label="Regular expression pattern">
        <span class="delim">/</span>
      </div>
      <div class="flags-wrap" role="group" aria-label="Flags">
        <span class="flag-always" title="global — always on">g</span>
        <label title="case-insensitive"><input type="checkbox" id="flag-i" value="i"> i</label>
        <label title="multiline anchors"><input type="checkbox" id="flag-m" value="m"> m</label>
        <label title="dot matches newline"><input type="checkbox" id="flag-s" value="s"> s</label>
        <label title="unicode mode"><input type="checkbox" id="flag-u" value="u"> u</label>
      </div>
      <div id="error-banner" role="alert" aria-live="polite" hidden></div>
    </section>

    <section class="editor-section" aria-label="Test string">
      <div class="editor-wrap">
        <div id="highlight-layer" aria-hidden="true"></div>
        <textarea id="test-input" spellcheck="false"
                  placeholder="Enter test string…" rows="10"></textarea>
      </div>
    </section>

    <section class="match-panel" aria-label="Match results">
      <h2>Matches <span id="match-count" class="badge">0</span></h2>
      <ol id="match-list"></ol>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
