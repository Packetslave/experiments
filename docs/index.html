<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%237aa2f7'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1b26;
      --surface: #24283b;
      --surface2: #2a2f45;
      --border: #3b4261;
      --text: #c0caf5;
      --text-muted: #565f89;
      --accent: #7aa2f7;
      --accent-hover: #9ab8ff;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: var(--bg);
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .main {
      flex: 1;
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 32px;
    }

    .intro {
      margin-bottom: 40px;
    }

    .intro h2 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .intro p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, background 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      background: var(--surface2);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .card h3 {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .card p {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    .card-arrow {
      font-size: 0.8rem;
      color: var(--accent);
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .main { padding: 32px 16px; }
      header { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">&#9881;</div>
    <h1>Tools</h1>
  </header>

  <div class="main">
    <div class="intro">
      <h2>All tools</h2>
      <p>A collection of small, single-purpose browser utilities.</p>
    </div>

    <div class="grid">
      <a class="card" href="json-formatter.html">
        <div class="card-icon">{ }</div>
        <h3>JSON Formatter</h3>
        <p>Paste raw JSON and see it pretty-printed with syntax highlighting. Supports formatting, minifying, and copying output.</p>
        <div class="card-arrow">Open &rarr;</div>
      </a>
    </div>
  </div>
</body>
</html>
